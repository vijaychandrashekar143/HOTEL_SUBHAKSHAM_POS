<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOTEL SUBHAKSHAM POS</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header class="header">

    <div class="hotel-details">
        <h1>HOTEL SUBHAKSHAM</h1>
        <p>📞 8142406358</p>
    </div>

    <div class="bill-info">

        <div>
            <label>Bill No</label>
            <span id="billNo">1001</span>
        </div>

        <div>
            <label>Date</label>
            <span id="billDate"></span>
        </div>

        <div>
            <label>Time</label>
            <span id="billTime"></span>
        </div>

    </div>

</header>

<div class="main-container">

    <!-- LEFT PANEL -->

    <aside class="left-panel">

        <div class="search-box">

            <input
                type="text"
                id="searchBox"
                placeholder="🔍 Search Menu">

        </div>

        <div id="categoryContainer" class="category-container">

        </div>

        <div id="menuContainer" class="menu-container">

        </div>

    </aside>

    <!-- RIGHT PANEL -->

    <section class="right-panel">

        <div class="bill-top">

            <select id="billType">
                <option>Dine In</option>
                <option>Parcel</option>
            </select>

            <input
                type="number"
                id="tableNo"
                placeholder="Table No">

        </div>

        <table>

            <thead>

                <tr>

                    <th>Item</th>
                    <th>Qty</th>
                    <th>Total</th>

                </tr>

            </thead>

            <tbody id="billBody">

            </tbody>

        </table>

        <div class="summary">

            <h2>Total</h2>

            <h1 id="grandTotal">₹0</h1>

        </div>

        <div class="buttons">

            <button id="printBtn">
                🖨 Print Bill
            </button>

            <button id="newBillBtn">
                ➕ New Bill
            </button>

        </div>

    </section>

</div>

<script src="js/app.js"></script>

</body>

</html>
